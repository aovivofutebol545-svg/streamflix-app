name: Manual Build APK

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: '34'
          ndk-version: '26.1.10909125'
          build-tools-version: '34.0.0'
      
      - name: Install dependencies
        run: npm install -g bun && bun install
      
      - name: Setup Expo
        run: npm install -g expo-cli
      
      - name: Export Bundle
        run: expo export --platform android --output-dir=./dist
      
      - name: Create APK
        run: |
          mkdir -p ./apk
          cp -r dist/* ./apk/ 2>/dev/null || true
          # Cria um arquivo zip com o bundle para que possa ser compilado depois
          cd apk && zip -r ../streamflix-bundle.zip . || true
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-app
          path: |
            dist/
            streamflix-bundle.zip
          retention-days: 30

      - name: Create Release
        uses: ncipollo/release-action@v1
        if: success()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v2.0.4-${{ github.run_number }}
          name: Streamflix v2.0.4 Build ${{ github.run_number }}
          body: |
            ✅ Build compilado com sucesso!
            
            📦 Incluso:
            - Bundle Android pronto
            - Assets compilados
            - Metadata
            
            🔄 OTA Updates pronto pra usar depois!
            
            📱 Para instalar:
            1. Baixe o arquivo
            2. Use em uma ferramenta de build Expo
            3. Ou publ com OTA: ./scripts/publish-update.sh
          artifacts: |
            dist/**/*
            streamflix-bundle.zip
