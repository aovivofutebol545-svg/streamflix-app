name: Build APK (Gradle - Sem EAS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: '34'
          ndk-version: '26.1.10909125'
          build-tools-version: '34.0.0'
      
      - name: Install dependencies
        run: npm install -g bun && bun install
      
      - name: Build APK with Expo
        run: |
          npm install -g expo-cli
          expo build:android --non-interactive --release-channel prod --type apk 2>&1 || true
          echo "Buildando com prebuild..."
          bunx expo prebuild --clean
        continue-on-error: true
      
      - name: Build Android APK with Gradle
        run: |
          cd android
          ./gradlew clean assembleRelease 2>&1 || ./gradlew clean assembleDebug
        continue-on-error: true
      
      - name: Find APK files
        run: |
          find . -name "*.apk" -type f
          ls -lah android/app/build/outputs/apk/ 2>/dev/null || echo "Nenhum APK encontrado"
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamflix-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
        continue-on-error: true
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
